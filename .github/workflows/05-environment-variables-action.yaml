name: 05 Envirionment Vairables Workflow

on:
    workflow_dispatch:

    push:

    pull_request:

env:
    GLO_VAR: GLOBAL VARIABLE

jobs:
    job-1:
        runs-on: ubuntu-latest
        env:
            JOB1_VAR: JOB 1 VARIABLE
        steps:
            - run: |
                  echo "GLOBAL VARIABLE : $GLO_VAR" # visible
                  echo "JOB VARIABLE : $JOB1_VAR"  # visible

    job-2:
        runs-on: ubuntu-latest
        env:
            JOB2_VAR: JOB 2 VARIABLE
        needs:
            - job-1
        steps:
            - run: |
                  echo "GLOBAL VARIABLE :- $GLO_VAR" # visible
                  echo "JOB 1 VARIABLE :- $JOB1_VAR"  # not visible
                  echo "JOB 2 VARIABLE :- $JOB2_VAR"  # visible
    job-3:
        runs-on: ubuntu-latest
        needs:
            - job-1
            - job-2
        steps:
            - run: |
                  echo "GLOBAL VARIABLE :- $GLO_VAR" # visible
                  echo "JOB 1 VARIABLE :- $JOB1_VAR"  # not visible
                  echo "JOB 2 VARIABLE :- $JOB2_VAR"  # not visible
                  cat "$GITHUB_EVENT_PATH"
